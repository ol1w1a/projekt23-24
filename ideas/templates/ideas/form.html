{% extends 'base.html' %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 20px auto;">
    <h2 style="color: #63b3ed; border-bottom: 1px solid #2d3748; padding-bottom: 10px;">
        💡 Dodaj Nowy Pomysł
    </h2>
    
    <p style="font-size: 0.9em; color: #a0aec0; margin-bottom: 20px;">
        Podziel się swoim projektem ze społecznością. Inni będą mogli na niego głosować!
    </p>

    <form method="POST">
        {% csrf_token %} <div class="form-group">
            {{ form.as_p }} </div>

        <div style="margin-top: 25px; display: flex; gap: 10px;">
            <button type="submit" class="btn">Opublikuj pomysł</button>
            <a href="{% url 'idea_list' %}" class="btn" style="background: #4a5568;">Anuluj</a>
        </div>
    </form>
</div>

<style>
    /* Dodatkowa stylizacja specyficzna dla formularza, by pasowała do Twojego dark theme */
    .form-group p {
        margin-bottom: 15px;
    }
    
    label {
        display: block;
        margin-bottom: 5px;
        color: #63b3ed;
        font-weight: bold;
    }

    input[type="text"], textarea {
        width: 100%;
        padding: 12px;
        background-color: #171923;
        border: 1px solid #2d3748;
        border-radius: 6px;
        color: #e2e8f0;
        font-size: 1rem;
        transition: border-color 0.2s;
    }

    input[type="text"]:focus, textarea:focus {
        border-color: #3182ce;
        outline: none;
    }
</style>
{% endblock %}
